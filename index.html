<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USA 美股情緒警示燈</title>
<style>
  :root{
    --bg: #06080b;
    --panel: #0f1217;
    --panel-line: #1e222b;
    --ink: #f0f2f5;
    --ink-dim: #9ea4b0;
    --ink-faint: #5f6573;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: radial-gradient(circle at 50% 0%, #171d26 0%, #06080b 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wrap {
    width: 100%;
    max-width: 960px;
  }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--panel-line);
  }
  .header .title {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .header .title b { color: var(--ink); font-weight: 600; }
  .header .updated {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    text-align: right;
    line-height: 1.5;
  }
  .header .updated .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
    margin-right: 6px;
  }
  .header .updated .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ---------- Signal panel ---------- */
  .signal-panel {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 18px;
    padding: 40px 32px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .signal-panel::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--state-color, var(--ink-faint));
    transition: background 0.6s ease;
  }

  .stack-and-score {
    display: flex;
    align-items: center;
    gap: 36px;
    margin-bottom: 22px;
  }

  /* Traffic light stack */
  .stack {
    background: #07080a;
    border: 1px solid var(--panel-line);
    border-radius: 14px;
    padding: 14px 11px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bulb {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #1c2025;
    transition: all 0.5s ease;
  }
  .bulb.on.red { background: var(--red); box-shadow: 0 0 22px 4px rgba(231, 76, 60, 0.55); }
  .bulb.on.yellow { background: var(--yellow); box-shadow: 0 0 22px 4px rgba(241, 196, 15, 0.55); }
  .bulb.on.green { background: var(--green); box-shadow: 0 0 22px 4px rgba(46, 204, 113, 0.55); }

  /* Score ring */
  .score-ring {
    position: relative;
    width: 116px; height: 116px;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .track { fill: none; stroke: var(--panel-line); stroke-width: 6; }
  .score-ring .progress {
    fill: none;
    stroke: var(--state-color, var(--ink-faint));
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s ease, stroke 0.6s ease;
  }
  .score-ring .label {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-ring .num {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--state-color, var(--ink));
    line-height: 1;
  }
  .score-ring .unit {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  .status-label {
    font-size: 22px;
    font-weight: 700;
    color: var(--state-color, var(--ink));
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .status-desc {
    font-size: 13.5px;
    color: var(--ink-dim);
    text-align: center;
    max-width: 380px;
  }

  /* ---------- Indicator Grid & Cards ---------- */
  .indicators-section-title {
    width: 100%;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-dim);
    margin-top: 36px;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
    font-family: var(--mono);
    text-transform: uppercase;
  }

  .indicator-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    width: 100%;
    margin-top: 8px;
    align-self: stretch;
  }

  .indicator-card {
    background: rgba(25, 28, 35, 0.65); /* translucent for glassmorphism */
    backdrop-filter: blur(8px);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 220px;
    text-align: left;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .indicator-card:hover {
    border-color: var(--ink-faint);
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
    background: rgba(25, 28, 35, 0.85);
  }

  .card-title {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-dim);
    margin-bottom: 12px;
  }

  .card-value-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    height: 34px;
  }

  .card-value-num {
    font-size: 26px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
  }

  .card-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    line-height: 1.2;
    display: inline-block;
  }
  .badge-green { background: rgba(62,207,110,0.12); color: var(--green); }
  .badge-yellow { background: rgba(232,163,61,0.12); color: var(--yellow); }
  .badge-red { background: rgba(224,72,62,0.12); color: var(--red); }
  .badge-orange { background: rgba(232,163,61,0.12); color: var(--yellow); }
  .badge-lightgreen { background: rgba(140,230,140,0.12); color: #8ce68c; }
  .badge-grey { background: rgba(86,92,102,0.12); color: var(--ink-dim); }

  .card-bar-container {
    position: relative;
    height: 6px;
    width: 100%;
    margin-top: 4px;
    margin-bottom: 16px;
    background: var(--panel-line);
    border-radius: 3px;
  }

  .card-bar {
    height: 100%;
    width: 100%;
    border-radius: 3px;
  }

  .vix-bar {
    background: linear-gradient(to right, var(--green) 33.3%, var(--yellow) 33.3% 66.6%, var(--red) 66.6%);
  }

  .cnn-bar {
    background: linear-gradient(to right, var(--red) 25%, var(--yellow) 25% 45%, var(--ink-faint) 45% 55%, #8ce68c 55% 75%, var(--green) 75%);
  }

  .naaim-bar {
    background: var(--ink-faint);
  }

  .aaii-bar {
    display: flex;
    height: 100%;
    width: 100%;
    border-radius: 3px;
    overflow: hidden;
  }
  .aaii-segment-bull { background: var(--green); height: 100%; }
  .aaii-segment-neu { background: var(--ink-faint); height: 100%; }
  .aaii-segment-bear { background: var(--red); height: 100%; }

  .bar-pin {
    position: absolute;
    top: 50%;
    width: 10px;
    height: 10px;
    background: var(--ink);
    border: 2px solid #000;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
    z-index: 5;
  }

  .tick-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(11,13,16,0.5); /* matches --bg for high contrast boundary */
    z-index: 2;
  }

  .aaii-threshold-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--ink);
    opacity: 0.7;
    z-index: 3;
  }

  .aaii-threshold-marker {
    position: absolute;
    top: -14px;
    transform: translateX(-50%);
    font-size: 9px;
    font-family: var(--mono);
    color: var(--ink-dim);
    font-weight: 600;
  }

  .aaii-values {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
    width: 100%;
  }
  .aaii-val-col {
    display: flex;
    flex-direction: column;
  }
  .aaii-val-label {
    font-size: 11px;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .aaii-val-num {
    font-size: 16px;
    font-weight: 700;
    font-family: var(--mono);
  }
  .aaii-val-num.bull { color: var(--green); }
  .aaii-val-num.neu { color: var(--ink-dim); }
  .aaii-val-num.bear { color: var(--red); }

  .card-desc {
    font-size: 11.5px;
    color: var(--ink-dim);
    line-height: 1.4;
    margin-bottom: 6px;
    margin-top: auto;
  }

  .card-date {
    font-size: 10.5px;
    color: var(--ink-faint);
    font-family: var(--mono);
  }

  /* ---------- Footer ---------- */
  .footer-note {
    margin-top: 22px;
    font-size: 11.5px;
    color: var(--ink-faint);
    text-align: center;
    line-height: 1.6;
  }
  .footer-note a { color: var(--ink-dim); text-decoration: none; border-bottom: 1px solid var(--panel-line); }

  .error-banner {
    margin-top: 16px;
    background: rgba(224,72,62,0.08);
    border: 1px solid rgba(224,72,62,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: #f0a39d;
    line-height: 1.6;
  }
  .error-banner .e-title { color: var(--red); font-weight: 700; margin-bottom: 4px; }

  .loading, .fatal {
    text-align: center;
    color: var(--ink-faint);
    font-family: var(--mono);
    font-size: 13px;
    padding: 60px 0;
  }

  @media (max-width: 900px) {
    .indicator-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
  }

  @media (max-width: 520px) {
    .indicator-grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .stack-and-score { gap: 20px; }
    .bulb { width: 30px; height: 30px; }
    .score-ring { width: 96px; height: 96px; }
    .score-ring .num { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="title">🇺🇸 USA <b>美股情緒</b> 警示燈 <span style="font-size: 10px; opacity: 0.6; font-weight: normal; margin-left: 4px; font-family: var(--mono);">v1.0.1</span></div>
    <div class="updated" id="updated">
      <span class="dot"></span><span id="updated-text">載入中…</span>
    </div>
  </div>

  <div id="content">
    <div class="loading">正在讀取最新資料 …</div>
  </div>

  <div class="footer-note">
    資料來源：CBOE VIX (Yahoo Finance) · CNN Fear &amp; Greed Index · AAII Investor Sentiment Survey · NAAIM Exposure Index<br>
    由 GitHub Actions 每日自動更新（紐約開盤前），所有閾值與評分規則可在 <code>fetch_data.py</code> 中調整。
  </div>
</div>

<script>
const STATE_COLORS = {
  red:    { main: "#e0483e", label: "高度警戒" },
  yellow: { main: "#e8a33d", label: "注意前方" },
  green:  { main: "#3ecf6e", label: "市場平靜" },
};

const INDICATOR_META = {
  vix:            { name: "VIX 恐慌指數",       unit: "",  fmt: v => v.toFixed(1) },
  cnn_fear_greed: { name: "CNN 恐慌與貪婪",     unit: "分", fmt: v => v.toFixed(0) },
  aaii_bearish:   { name: "AAII 看跌情緒",       unit: "%", fmt: v => v.toFixed(1) + "%" },
  naaim:          { name: "NAAIM 經理人持倉",    unit: "",  fmt: v => v.toFixed(1) },
};

function timeAgo(iso) {
  const then = new Date(iso);
  const now = new Date();
  const diffMin = Math.round((now - then) / 60000);
  if (diffMin < 1) return "剛剛更新";
  if (diffMin < 60) return `${diffMin} 分鐘前更新`;
  const diffHr = Math.round(diffMin / 60);
  if (diffHr < 24) return `${diffHr} 小時前更新`;
  const diffDay = Math.round(diffHr / 24);
  return `${diffDay} 天前更新`;
}

function renderBulbs(color) {
  const order = ["red", "yellow", "green"];
  return order.map(c =>
    `<div class="bulb ${c === color ? "on " + c : ""}"></div>`
  ).join("");
}

function renderScoreRing(score, maxScore, colorHex) {
  const r = 52;
  const circumference = 2 * Math.PI * r;
  const pct = Math.min(score / maxScore, 1);
  const offset = circumference * (1 - pct);
  return `
    <div class="score-ring" style="--state-color:${colorHex}">
      <svg width="116" height="116" viewBox="0 0 116 116">
        <circle class="track" cx="58" cy="58" r="${r}"></circle>
        <circle class="progress" cx="58" cy="58" r="${r}"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${offset}"></circle>
      </svg>
      <div class="label">
        <div class="num">${score}</div>
        <div class="unit">分</div>
      </div>
    </div>
  `;
}

function getYYYYMMDD(iso) {
  if (!iso) return "無日期";
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const r = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${r}`;
}

function renderVixCard(ind, updatedAt) {
  const hasVal = ind && ind.value !== null && ind.value !== undefined;
  const val = hasVal ? ind.value : null;
  const valStr = hasVal ? val.toFixed(2) : "—";
  
  let badgeText = "無資料";
  let badgeClass = "badge-grey";
  let valColor = "var(--ink-faint)";
  let pct = 0;
  
  if (hasVal) {
    if (val <= 20) {
      badgeText = "正常波動";
      badgeClass = "badge-green";
      valColor = "var(--green)";
    } else if (val <= 30) {
      badgeText = "波動偏高";
      badgeClass = "badge-yellow";
      valColor = "var(--yellow)";
    } else {
      badgeText = "恐慌警戒";
      badgeClass = "badge-red";
      valColor = "var(--red)";
    }
    pct = Math.max(0, Math.min(100, ((val - 10) / 30) * 100));
  }
  
  const dateStr = getYYYYMMDD(updatedAt);
  
  return `
    <div class="indicator-card">
      <div class="card-title">VIX 當前數值</div>
      <div class="card-value-row">
        <div class="card-value-num" style="color: ${valColor}">${valStr}</div>
        <div class="card-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="card-bar-container">
        <div class="card-bar vix-bar"></div>
        <div class="tick-line" style="left: 33.3%;"></div>
        <div class="tick-line" style="left: 66.6%;"></div>
        ${hasVal ? `<div class="bar-pin" style="left: ${pct}%;"></div>` : ""}
      </div>
      <div class="card-desc">CBOE 波動率指數</div>
      <div class="card-date">CBOE 延遲報價 · ${dateStr}</div>
    </div>
  `;
}

function getCnnInfo(score, rating) {
  if (score === null || score === undefined) {
    return { text: "無資料", clsp: "badge-grey", color: "var(--ink-faint)" };
  }
  let r = rating ? rating.toLowerCase() : "";
  if (!r) {
    if (score < 25) r = "extreme fear";
    else if (score < 45) r = "fear";
    else if (score < 55) r = "neutral";
    else if (score < 75) r = "greed";
    else r = "extreme greed";
  }
  if (r.includes("extreme fear")) return { text: "極度恐慌", clsp: "badge-red", color: "var(--red)" };
  if (r.includes("fear")) return { text: "恐慌", clsp: "badge-yellow", color: "var(--yellow)" };
  if (r.includes("extreme greed")) return { text: "極度貪婪", clsp: "badge-green", color: "var(--green)" };
  if (r.includes("greed")) return { text: "貪婪", clsp: "badge-lightgreen", color: "var(--green)" };
  return { text: "中性", clsp: "badge-grey", color: "var(--ink-dim)" };
}

function renderCnnCard(ind, updatedAt) {
  const hasVal = ind && ind.value !== null && ind.value !== undefined;
  const val = hasVal ? ind.value : null;
  const valStr = hasVal ? val.toFixed(0) : "—";
  
  const info = getCnnInfo(val, ind && ind.info ? ind.info.rating : "");
  
  let histStr = "0-100 越低越恐慌";
  if (ind && ind.info && ind.info.previous_1_week !== undefined && ind.info.previous_1_month !== undefined) {
    const w = Math.round(ind.info.previous_1_week);
    const m = Math.round(ind.info.previous_1_month);
    histStr = `上週 ${w} ➔ 上月 ${m} ; 0-100 越低越恐慌`;
  }
  
  const pct = hasVal ? Math.max(0, Math.min(100, val)) : 0;
  const dateStr = getYYYYMMDD(updatedAt);
  
  return `
    <div class="indicator-card">
      <div class="card-title">CNN 恐慌與貪婪指數</div>
      <div class="card-value-row">
        <div class="card-value-num" style="color: ${info.color}">${valStr}</div>
        <div class="card-badge ${info.clsp}">${info.text}</div>
      </div>
      <div class="card-bar-container">
        <div class="card-bar cnn-bar"></div>
        <div class="tick-line" style="left: 25%;"></div>
        <div class="tick-line" style="left: 45%;"></div>
        <div class="tick-line" style="left: 55%;"></div>
        <div class="tick-line" style="left: 75%;"></div>
        ${hasVal ? `<div class="bar-pin" style="left: ${pct}%;"></div>` : ""}
      </div>
      <div class="card-desc">${histStr}</div>
      <div class="card-date">CNN Business · ${dateStr}</div>
    </div>
  `;
}

function renderAaiiCard(ind, updatedAt) {
  const hasInfo = ind && ind.info && ind.info.bearish !== undefined && ind.info.bearish !== null;
  const bearishVal = hasInfo ? ind.info.bearish : (ind && ind.value !== null ? ind.value : null);
  const bullishVal = hasInfo ? ind.info.bullish : null;
  const neutralVal = hasInfo ? ind.info.neutral : null;
  
  const bearishStr = bearishVal !== null ? bearishVal.toFixed(1) + "%" : "—";
  const bullishStr = bullishVal !== null ? bullishVal.toFixed(1) + "%" : "—";
  const neutralStr = neutralVal !== null ? neutralVal.toFixed(1) + "%" : "—";
  
  let barHtml = "";
  if (bearishVal !== null) {
    const bull = bullishVal !== null ? bullishVal : (100 - bearishVal) * 0.6;
    const neu = neutralVal !== null ? neutralVal : (100 - bearishVal) * 0.4;
    const bear = bearishVal;
    const sum = bull + neu + bear;
    const bullPct = (bull / sum) * 100;
    const neuPct = (neu / sum) * 100;
    const bearPct = (bear / sum) * 100;
    
    barHtml = `
      <div class="card-bar-container">
        <div class="card-bar aaii-bar">
          <div class="aaii-segment-bull" style="width: ${bullPct}%;"></div>
          <div class="aaii-segment-neu" style="width: ${neuPct}%;"></div>
          <div class="aaii-segment-bear" style="width: ${bearPct}%;"></div>
        </div>
        <div class="aaii-threshold-line" style="left: 55%;"></div>
        <div class="aaii-threshold-marker" style="left: 55%;">45%</div>
      </div>
    `;
  } else {
    barHtml = `
      <div class="card-bar-container">
        <div class="card-bar vix-bar" style="background: var(--panel-line);"></div>
      </div>
    `;
  }
  
  return `
    <div class="indicator-card">
      <div class="card-title">AAII 投資者情緒</div>
      <div class="aaii-values">
        <div class="aaii-val-col">
          <div class="aaii-val-label">看漲</div>
          <div class="aaii-val-num bull">${bullishStr}</div>
        </div>
        <div class="aaii-val-col">
          <div class="aaii-val-label">中性</div>
          <div class="aaii-val-num neu">${neutralStr}</div>
        </div>
        <div class="aaii-val-col">
          <div class="aaii-val-label">看跌</div>
          <div class="aaii-val-num bear" style="color: ${bearishVal > 45 ? "var(--red)" : "var(--ink)"}">${bearishStr}</div>
        </div>
      </div>
      ${barHtml}
      <div class="card-desc">散戶調查，看跌 > 45% 為過度悲觀</div>
      <div class="card-date">AAII 每週四更新</div>
    </div>
  `;
}

function renderNaaimCard(ind, updatedAt) {
  const hasVal = ind && ind.value !== null && ind.value !== undefined;
  const val = hasVal ? ind.value : null;
  const valStr = hasVal ? val.toFixed(2) : "—";
  
  let valColor = "var(--ink-faint)";
  let pct = 0;
  if (hasVal) {
    if (val >= 55) valColor = "var(--green)";
    else if (val >= 30) valColor = "var(--yellow)";
    else valColor = "var(--red)";
    pct = Math.max(0, Math.min(100, val));
  }
  
  const dateStr = getYYYYMMDD(updatedAt);
  
  return `
    <div class="indicator-card">
      <div class="card-title">NAAIM 經理人持倉指數</div>
      <div class="card-value-row">
        <div class="card-value-num" style="color: ${valColor}">${valStr}</div>
        ${hasVal && val < 55 ? `<div class="card-badge ${val < 30 ? "badge-red" : "badge-yellow"}">${val < 30 ? "絕對低點" : "相對低點"}</div>` : ""}
      </div>
      <div class="card-bar-container">
        <div class="card-bar naaim-bar"></div>
        <div class="tick-line" style="left: 30%;"></div>
        <div class="tick-line" style="left: 55%;"></div>
        ${hasVal ? `<div class="bar-pin" style="left: ${pct}%;"></div>` : ""}
      </div>
      <div class="card-desc">低於 55 是相對低點，低於 30 是絕對低點</div>
      <div class="card-date">NAAIM · ${dateStr} 當週</div>
    </div>
  `;
}

async function loadData() {
  try {
    const res = await fetch("data.json?_=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById("content").innerHTML = `
      <div class="fatal">
        無法載入 data.json<br>
        <span style="color:#565c66">${err.message}</span><br><br>
        請確認 GitHub Actions 是否已成功執行過一次，產生 data.json。
      </div>`;
    document.getElementById("updated-text").textContent = "載入失敗";
  }
}

function render(data) {
  const colorKey = data.status.color;
  const state = STATE_COLORS[colorKey];
  const score = data.total_score;
  const maxScore = 6; // 1(VIX) + 2(VIX) ... 實際上限抓寬一點，視覺進度條用

  const html = `
    <div class="signal-panel" style="--state-color:${state.main}">
      <div class="stack-and-score">
        <div class="stack">${renderBulbs(colorKey)}</div>
        ${renderScoreRing(score, maxScore, state.main)}
      </div>
      <div class="status-label">${state.label}</div>
      <div class="status-desc">${data.status.desc}</div>

      <div class="indicators-section-title">USA 美國市場指標</div>
      <div class="indicator-grid">
        ${renderVixCard(data.indicators.vix, data.updated_at)}
        ${renderCnnCard(data.indicators.cnn_fear_greed, data.updated_at)}
        ${renderAaiiCard(data.indicators.aaii_bearish, data.updated_at)}
        ${renderNaaimCard(data.indicators.naaim, data.updated_at)}
      </div>

      ${data.errors && data.errors.length > 0 ? `
        <div class="error-banner">
          <div class="e-title">⚠ ${data.errors.length} 個資料來源抓取失敗</div>
          ${data.errors.map(e => `· ${escapeHtml(e)}`).join("<br>")}
        </div>
      ` : ""}
    </div>
  `;

  document.getElementById("content").innerHTML = html;

  const dot = document.querySelector(".updated .dot");
  dot.className = "dot" + (data.errors.length === 0 ? " live" : "");
  document.getElementById("updated-text").textContent = timeAgo(data.updated_at);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

loadData();
</script>

</body>
</html>
